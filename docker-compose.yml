services:
  openclaw-init:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    user: "0:0"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENCLAW_CONFIG_ROOT: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_BOOTSTRAP_TOKEN_FILE: /home/node/.openclaw/.gateway-token
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      OPENCLAW_GATEWAY_PORT: 18789
      OPENCLAW_UID: ${OPENCLAW_UID:-1000}
      OPENCLAW_GID: ${OPENCLAW_GID:-1000}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-openclaw-config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-openclaw-workspace}:/home/node/.openclaw/workspace
      - ./scripts:/bootstrap:ro
    entrypoint: ["/bin/sh", "/bootstrap/openclaw-init.sh"]

  cockpit-bootstrap:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    user: "0:0"
    network_mode: "service:openclaw-gateway"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_CONFIG_ROOT: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_BOOTSTRAP_TOKEN_FILE: /home/node/.openclaw/.gateway-token
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      OPENCLAW_GATEWAY_URL: http://127.0.0.1:18789
      OPENCLAW_DEVICE_FILE: /var/lib/cockpit/openclaw-device.json
      OPENCLAW_DEVICE_TOKEN_FILE: /var/lib/cockpit/openclaw-device-token
      OPENCLAW_BOOTSTRAP_WAIT_SECONDS: ${OPENCLAW_BOOTSTRAP_WAIT_SECONDS:-90}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-openclaw-config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-openclaw-workspace}:/home/node/.openclaw/workspace
      - cockpit-state:/var/lib/cockpit
      - ./scripts:/bootstrap:ro
    entrypoint: ["/bin/sh", "/bootstrap/local-bootstrap.sh"]
    depends_on:
      openclaw-gateway:
        condition: service_healthy

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-openclaw-config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-openclaw-workspace}:/home/node/.openclaw/workspace
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1) or use
      ## scripts/docker/setup.sh with OPENCLAW_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  cockpit:
    build:
      context: .
      dockerfile: packages/cockpit/Dockerfile
    ports:
      - "${COCKPIT_PORT:-3000}:3000"
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-openclaw-config}:/openclaw-config
      - cockpit-state:/var/lib/cockpit
    environment:
      OPENCLAW_GATEWAY_URL: http://openclaw-gateway:18789
      OPENCLAW_CONFIG_ROOT: /openclaw-config
      OPENCLAW_BOOTSTRAP_TOKEN_FILE: /openclaw-config/.gateway-token
      OPENCLAW_DEVICE_FILE: /var/lib/cockpit/openclaw-device.json
      OPENCLAW_DEVICE_TOKEN_FILE: /var/lib/cockpit/openclaw-device-token
    depends_on:
      openclaw-gateway:
        condition: service_healthy
      cockpit-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-openclaw-config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-openclaw-workspace}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway

volumes:
  openclaw-config:
  openclaw-workspace:
  cockpit-state:
